<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f5f5f2">
  <meta name="description" content="Mission 68 personal nutrition, training and weight tracker">
  <title>Mission 68</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app" class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">PERSONAL HEALTH SYSTEM</p>
        <h1>Mission 68</h1>
      </div>
      <button id="quickAdd" class="icon-button" aria-label="Quick add">+</button>
    </header>

    <main>
      <section id="view-today" class="view active" aria-labelledby="nav-today"></section>
      <section id="view-log" class="view" aria-labelledby="nav-log"></section>
      <section id="view-plan" class="view" aria-labelledby="nav-plan"></section>
      <section id="view-insights" class="view" aria-labelledby="nav-insights"></section>
      <section id="view-settings" class="view" aria-labelledby="nav-settings"></section>
    </main>

    <nav class="bottom-nav" aria-label="Primary navigation">
      <button id="nav-today" class="nav-item active" data-view="today"><span>Today</span></button>
      <button id="nav-log" class="nav-item" data-view="log"><span>Log</span></button>
      <button id="nav-plan" class="nav-item" data-view="plan"><span>Library</span></button>
      <button id="nav-insights" class="nav-item" data-view="insights"><span>Insights</span></button>
      <button id="nav-settings" class="nav-item" data-view="settings"><span>Settings</span></button>
    </nav>
  </div>

  <div id="overlay" class="overlay" hidden></div>
  <section id="sheet" class="sheet" aria-modal="true" role="dialog" hidden>
    <div class="sheet-handle"></div>
    <div id="sheetContent"></div>
  </section>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="db.js"></script>
  <script src="app.js"></script>
</body>
</html>
